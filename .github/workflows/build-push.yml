# .github/workflows/build-push.yml
#
# Builds and pushes the citrineos-operator-ui Docker image to Artifact Registry,
# then triggers a deploy in k8s-ocpp.
#
# Triggers on push to `stage` or `main`.

name: Build & deploy

on:
  push:
    branches:
      - stage
      - main

env:
  PROJECT_ID:  ocpp-platform-489309
  REGISTRY:    europe-west6-docker.pkg.dev
  REPOSITORY:  ocpp-images
  SERVICE:     citrineos-operator-ui
  DOCKERFILE:  Dockerfile
  CONTEXT:     .

jobs:
  build:
    name: Build citrineos-operator-ui (${{ github.ref_name }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Resolve branch metadata
        id: meta
        run: |
          SHA7="${GITHUB_SHA:0:7}"
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env_name=prod"          >> "$GITHUB_OUTPUT"
            echo "image_tag=prod-${SHA7}" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=stage"           >> "$GITHUB_OUTPUT"
            echo "image_tag=stage-${SHA7}"  >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GH_ACTIONS_SA }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            NEXT_PUBLIC_ADMIN_EMAIL=${{ secrets.NEXT_PUBLIC_ADMIN_EMAIL }}
            NEXT_PUBLIC_ADMIN_PASSWORD=${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}
            NEXT_PUBLIC_AUTH_PROVIDER=generic
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Trigger deploy in k8s-ocpp
        run: |
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/sloperators/k8s-ocpp/dispatches \
            -d "{
              \"event_type\": \"service-image-ready\",
              \"client_payload\": {
                \"service\":   \"${{ env.SERVICE }}\",
                \"image_tag\": \"${{ steps.meta.outputs.image_tag }}\",
                \"env_name\":  \"${{ steps.meta.outputs.env_name }}\"
              }
            }"
